<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Malgun Gothic", sans-serif;
        background: #f4f6f9;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #222;
        margin-bottom: 10px;
    }

    .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
    }

    .menu-container {
        max-width: 700px;
        margin: 0 auto;
    }

    .menu-item {
        display: block;
        text-decoration: none;
        color: #222;
        background: #fff;
        padding: 25px;
        margin-bottom: 15px;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: all 0.2s ease;
    }

    .menu-item:hover {
        transform: translateY(-3px);
        color: white;
    }

    .menu-item:active {
        transform: scale(0.98);
    }

    .theory {
        border-left: 8px solid #673AB7;
    }
    .circuit {
        border-left: 8px solid #2196F3;
    }
    .control {
        border-left: 8px solid #4CAF50;
    }
    .electromagnetics {
        border-left: 8px solid #FF9800;
    }
    .power {
        border-left: 8px solid #F44336;
    }
    .machines {
        border-left: 8px solid #009688;
    }
    .kec {
        border-left: 8px solid #795548;
    }

    .theory:hover {
        background: #673AB7;
    }
    .circuit:hover {
        background: #2196F3;
    }
    .control:hover {
        background: #4CAF50;
    }
    .electromagnetics:hover {
        background: #FF9800;
    }
    .power:hover {
        background: #F44336;
    }
    .machines:hover {
        background: #009688;
    }
    .kec:hover {
        background: #795548;
    }

    @media (prefers-color-scheme: dark) {
        body {
            background: #1e1e1e;
        }

        h1,
        .menu-item {
            color: white;
        }

        .subtitle {
            color: #ccc;
        }

        .menu-item {
            background: #2d2d2d;
        }
    }
</style>
</head>
